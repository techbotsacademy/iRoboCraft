<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive 2DOF Robotic Arm Simulation</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

h1{
    text-align:center;
    margin-top:15px;
}

#info{
    text-align:center;
    line-height:1.8;
    margin-bottom:10px;
}

canvas{
    display:block;
    margin:auto;
    background:#111827;
    border:2px solid #334155;
}

.legend{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:10px;
}

.legend div{
    display:flex;
    align-items:center;
    gap:8px;
}

.color{
    width:20px;
    height:4px;
}

</style>
</head>
<body>

<h1>2DOF Robotic Arm Simulation</h1>

<div class="legend">
    <div><span class="color" style="background:red"></span> Δx</div>
    <div><span class="color" style="background:deepskyblue"></span> Δy</div>
    <div><span class="color" style="background:lime"></span> Arm Direction</div>
</div>

<div id="info">
    Drag the ORANGE point (Origin) and GREEN point (Destination)<br>
    Observe how tan(θ) changes with movement.
</div>

<canvas id="canvas" width="1000" height="700"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const gridSize = 50;

let origin = {
    x: 250,
    y: 500
};

let target = {
    x: 700,
    y: 250
};

let dragging = null;

canvas.addEventListener("mousedown", (e)=>{

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if(distance(mx,my,origin.x,origin.y) < 15){
        dragging = "origin";
    }
    else if(distance(mx,my,target.x,target.y) < 15){
        dragging = "target";
    }

});

canvas.addEventListener("mousemove", (e)=>{

    if(!dragging) return;

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if(dragging === "origin"){
        origin.x = snap(mx);
        origin.y = snap(my);
    }

    if(dragging === "target"){
        target.x = snap(mx);
        target.y = snap(my);
    }

    draw();

});

canvas.addEventListener("mouseup", ()=>{
    dragging = null;
});

canvas.addEventListener("mouseleave", ()=>{
    dragging = null;
});

function snap(value){
    return Math.round(value/gridSize)*gridSize;
}

function distance(x1,y1,x2,y2){
    return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
}

function drawGrid(){

    ctx.strokeStyle = "#334155";
    ctx.lineWidth = 1;

    for(let x=0; x<canvas.width; x+=gridSize){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();
    }

    for(let y=0; y<canvas.height; y+=gridSize){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(canvas.width,y);
        ctx.stroke();
    }

    // Coordinate labels
    ctx.fillStyle = "#94a3b8";
    ctx.font = "11px Arial";

    for(let x=0; x<canvas.width; x+=gridSize){

        for(let y=0; y<canvas.height; y+=gridSize){

            ctx.fillText(
                `(${x/gridSize},${(canvas.height-y)/gridSize})`,
                x+3,
                y+15
            );
        }
    }
}

function drawArm(){

    const dx = (target.x - origin.x)/gridSize;
    const dy = (origin.y - target.y)/gridSize;

    // RED horizontal line
    ctx.strokeStyle = "red";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(target.x, origin.y);
    ctx.stroke();

    // BLUE vertical line
    ctx.strokeStyle = "deepskyblue";

    ctx.beginPath();
    ctx.moveTo(target.x, origin.y);
    ctx.lineTo(target.x, target.y);
    ctx.stroke();

    // GREEN diagonal arm line
    ctx.strokeStyle = "lime";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(target.x, target.y);
    ctx.stroke();

    // Origin point
    ctx.fillStyle = "orange";

    ctx.beginPath();
    ctx.arc(origin.x, origin.y, 14, 0, Math.PI*2);
    ctx.fill();

    // Target point
    ctx.fillStyle = "#22c55e";

    ctx.beginPath();
    ctx.arc(target.x, target.y, 14, 0, Math.PI*2);
    ctx.fill();

    // Angle calculation
    const angle = Math.atan2(dy, dx);
    const degrees = angle * 180 / Math.PI;

    // Yellow angle arc
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.arc(origin.x, origin.y, 60, 0, -angle, true);
    ctx.stroke();

    // Text panel
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";

    ctx.fillText(`Δx = ${dx}`, 20, 40);
    ctx.fillText(`Δy = ${dy}`, 20, 70);

    ctx.fillText(
        `tan(θ) = Δy / Δx = ${dy} / ${dx}`,
        20,
        110
    );

    ctx.fillText(
        `θ = ${degrees.toFixed(2)}°`,
        20,
        145
    );
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawGrid();

    drawArm();
}

draw();

</script>

</body>
</html>
