<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Vector Playground</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
}

h2{
    margin-bottom:5px;
}

#status{
    margin-bottom:15px;
    color:#555;
}

.input-container{
    position:relative;
    width:900px;
    max-width:100%;
}

#input{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
}

#suggestions{
    position:absolute;
    top:100%;
    left:0;
    right:0;
    border:1px solid #ccc;
    border-top:none;
    background:white;
    max-height:250px;
    overflow-y:auto;
    z-index:1000;
}

.suggestion{
    padding:8px;
    cursor:pointer;
}

.suggestion:hover{
    background:#f0f0f0;
}

button{
    margin-top:10px;
    padding:10px 16px;
    font-size:16px;
    cursor:pointer;
}

table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}

th{
    background:#f5f5f5;
}

.vector-box{
    margin-top:20px;
    padding:10px;
    border:1px solid #ccc;
    background:#fafafa;
    font-family:monospace;
    white-space:pre-wrap;
    word-break:break-all;
}

.example{
    color:#666;
    margin-bottom:10px;
}
</style>

</head>

<body>

<h2>Word Vector Playground</h2>

<div class="example">
Examples:
<br>
king-man+woman
<br>
walking-walk+swim
</br>
<br>
bigger-big+small
</br>
</div>

<div id="status">Loading embeddings...</div>

<select id="mode">
    <option value="analogy">Analogy</option>
    <option value="similar">Similar</option>
    <option value="opposite">Opposite</option>
</select>

<br><br>

<div class="input-container">
    <input
        id="input"
        type="text"
        autocomplete="off"
        placeholder="king-man+woman">
    <div id="suggestions"></div>
</div>

<button onclick="run()">Compute</button>

<div id="results"></div>

<script>

let embeddings = {};
let vocabulary = [];
let OPPOSITE_AXIS = null;

async function loadEmbeddings(){

    embeddings =
        await fetch("embeddings.json")
        .then(r => r.json());

    vocabulary =
        Object.keys(embeddings);

document.getElementById("status").innerHTML =
    "Loaded " +
    vocabulary.length.toLocaleString() +
    " words";

OPPOSITE_AXIS =
    buildOppositionAxis();
}

function cosine(a,b){

    let dot=0;
    let normA=0;
    let normB=0;

    for(let i=0;i<a.length;i++){

        dot += a[i]*b[i];
        normA += a[i]*a[i];
        normB += b[i]*b[i];
    }

    return dot /
        (Math.sqrt(normA) *
         Math.sqrt(normB));
}

function nearestVector(
    vector,
    limit = 20,
    excludedWords = []
){

    const excluded =
        new Set(excludedWords);

    const results = [];

    for(const word of vocabulary){

        if(excluded.has(word))
            continue;

        results.push({
            word,
            score: cosine(
                vector,
                embeddings[word]
            )
        });
    }

    results.sort(
        (a,b)=>b.score-a.score
    );

    return results.slice(0,limit);
}

function parseExpression(expr){

    expr = expr
        .split("≈")[0]
        .trim()
        .toLowerCase()
        .replace(/\s+/g,"");

    const tokens =
        expr.match(/[+-]|[a-zA-Z_]+/g);

    if(!tokens)
        return null;

    let result = null;
    let op = "+";

    const usedWords = [];

    for(const token of tokens){

        if(token==="+" ||
           token==="-"){

            op = token;
            continue;
        }

        if(!embeddings[token])
            continue;

        usedWords.push(token);

        const vec =
            embeddings[token];

        if(result===null){

            result = [...vec];
        }
        else{

            for(let i=0;i<vec.length;i++){

                if(op==="+")

                    result[i]+=vec[i];

                else

                    result[i]-=vec[i];
            }
        }
    }

    return {
        vector: result,
        usedWords
    };
}

function similar(word){

    if(!embeddings[word])
        return [];

    const vec = embeddings[word];

    const results = [];

    for(const candidate of vocabulary){

        if(candidate === word)
            continue;

        results.push({
            word: candidate,
            score: cosine(
                vec,
                embeddings[candidate]
            )
        });
    }

    results.sort(
        (a,b)=>b.score-a.score
    );

    return results.slice(0,20);
}

function buildOppositionAxis(){

    const pairs = [
        ["good","bad"],
        ["happy","sad"],
        ["hot","cold"],
        ["strong","weak"],
        ["large","small"],
        ["young","old"]
    ];

    const dim =
        embeddings[
            Object.keys(embeddings)[0]
        ].length;

    const axis =
        new Array(dim).fill(0);

    for(const [pos,neg] of pairs){

        if(
            !embeddings[pos] ||
            !embeddings[neg]
        ){
            continue;
        }

        for(let i=0;i<dim;i++){

            axis[i] +=
                embeddings[pos][i]
                -
                embeddings[neg][i];
        }
    }

    const norm =
        Math.sqrt(
            axis.reduce(
                (s,v)=>s+v*v,
                0
            )
        );

    return axis.map(
        v=>v/norm
    );
}

function opposite(word){

    if(!embeddings[word])
        return [];

    const vector =
        embeddings[word];

    let projection = 0;

    for(let i=0;i<vector.length;i++){

        projection +=
            vector[i] *
            OPPOSITE_AXIS[i];
    }

    const reflected =
        vector.map(
            (value,index)=>
                value -
                2 *
                projection *
                OPPOSITE_AXIS[index]
        );

    return nearestVector(
        reflected,
        20,
        [word]
    );
}

function run(){

    const mode =
        document
        .getElementById("mode")
        .value;

    const input =
        document
        .getElementById("input")
        .value
        .trim()
        .toLowerCase();

    let rows = [];
    let title = "";

    if(mode==="similar"){

        rows =
            similar(input);

        title =
            "Most Similar Words";
    }

    else if(mode==="opposite"){

        rows =
            opposite(input);

        title =
            "Most Opposite Words";
    }

    else{

        const parsed =
            parseExpression(
                input
            );

        if(!parsed){

            alert(
                "Could not compute expression."
            );
            return;
        }

        rows =
            nearestVector(
                parsed.vector,
                20,
                parsed.usedWords
            );

        title =
            "Analogy Results";
    }

    let html = `
    <h3>${title}</h3>

    <table>

    <tr>
        <th>Rank</th>
        <th>Word</th>
        <th>Similarity</th>
    </tr>
    `;

    rows.forEach((row,index)=>{

        html += `
        <tr>
            <td>${index+1}</td>
            <td>${row.word}</td>
            <td>${row.score.toFixed(6)}</td>
        </tr>
        `;
    });

    html += "</table>";

    document
        .getElementById("results")
        .innerHTML = html;
}

const input =
    document.getElementById("input");

input.addEventListener(
    "input",
    function(){

const mode =
    document
    .getElementById("mode")
    .value;

let currentWord;

if(mode==="analogy"){

    currentWord =
        this.value
            .split(/[+-]/)
            .pop()
            .replace(/≈.*/,"")
            .trim()
            .toLowerCase();
}
else{

    currentWord =
        this.value
            .trim()
            .toLowerCase();
}
        const box =
            document.getElementById(
                "suggestions"
            );

        if(currentWord.length===0){

            box.innerHTML="";
            return;
        }

        const matches =
            vocabulary
            .filter(
                w => w.startsWith(
                    currentWord
                )
            )
            .slice(0,20);

        box.innerHTML =
            matches.map(
                word => `
                <div
                class="suggestion"
                onclick="insertWord('${word}')">
                ${word}
                </div>
                `
            ).join("");
    }
);

function insertWord(word){

    const mode =
        document
        .getElementById("mode")
        .value;

    const textbox =
        document.getElementById("input");

    if(mode!=="analogy"){

        textbox.value = word;

        document.getElementById(
            "suggestions"
        ).innerHTML = "";

        return;
    }

    const value =
        textbox.value;

    const parts =
        value.split(/[+-]/);

    parts[parts.length-1] =
        word;

    let rebuilt = "";
    let idx = 0;

    for(let i=0;i<value.length;i++){

        const c = value[i];

        if(c==="+" || c==="-"){

            rebuilt +=
                parts[idx++];

            rebuilt += c;
        }
    }

    rebuilt += parts[idx];

    textbox.value =
        rebuilt;

    document.getElementById(
        "suggestions"
    ).innerHTML = "";
}

document.addEventListener(
    "click",
    function(e){

        if(!e.target.classList.contains(
            "suggestion")){

            document.getElementById(
                "suggestions"
            ).innerHTML="";
        }
    }
);

document
.getElementById("mode")
.addEventListener(
    "change",
    function(){

        const input =
            document
            .getElementById("input");

        if(
            this.value==="analogy"
        ){

            input.placeholder =
                "king-man+woman";
        }
        else{

            input.placeholder =
                "happy";
        }
    }
);

loadEmbeddings();

</script>

</body>
</html>
