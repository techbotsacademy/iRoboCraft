<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Light Intent AI Classifier</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:16px;
}

button{
    padding:12px 24px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

.bar{
    width:100%;
    background:#ddd;
    height:30px;
    border-radius:8px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    transition:width .5s;
}

.on{
    background:#4CAF50;
}

.off{
    background:#F44336;
}

#result{
    margin-top:20px;
    display:none;
}

#prediction{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

#status{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Light Intent AI Classifier</h1>

<p>
Examples:
</p>

<ul>
<li>Leave the light on</li>
<li>Brighten up the room</li>
<li>Save electricity</li>
<li>Nobody is using this room</li>
<li>Keep the porch light running</li>
</ul>

<textarea id="input"></textarea>

<br>

<button id="classifyBtn">
    Classify
</button>

<div id="status">
Loading model not started
</div>

<div id="result">

<div id="prediction"></div>

<div>
ON: <span id="onPct">0%</span>
<div class="bar">
<div id="onBar" class="fill on"></div>
</div>
</div>

<br>

<div>
OFF: <span id="offPct">0%</span>
<div class="bar">
<div id="offBar" class="fill off"></div>
</div>
</div>

</div>

<script type="module">
document
    .getElementById("classifyBtn")
    .addEventListener(
        "click",
        classifySentence
    );

import {
    pipeline
}
from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let extractor = null;

const ON_EXAMPLES = [

"turn on the light",
"switch on the light",
"leave the light on",
"keep the light on",
"keep the lamp running",
"brighten the room",
"make the room brighter",
"illuminate the room",
"light up the room",
"leave the porch light on",
"ensure the room stays lit",
"keep the hallway illuminated",
"turn on the bedroom light",
"leave the lamp illuminated",
"maintain lighting in the room",
"keep this area well lit",
"let the light remain on",
"switch on the lamp",
"activate the light",
"make sure the room is bright"

];

const OFF_EXAMPLES = [

"turn off the light",
"switch off the light",
"shut off the light",
"save electricity",
"save power",
"nobody is using this room",
"nobody is home",
"darken the room",
"make the room darker",
"leave the light off",
"keep the light off",
"dont switch on the light",
"do not turn on the light",
"prevent the light from staying on",
"reduce electricity usage",
"stop wasting power",
"switch off the lamp",
"the room does not need lighting",
"nobody is here",
"turn the lamp off"

];

let onEmbeddings = [];
let offEmbeddings = [];

async function loadModel() {

    if (extractor) return;

    document.getElementById("status").innerText =
        "Downloading embedding model...";

    extractor = await pipeline(
        "feature-extraction",
        "Xenova/all-MiniLM-L6-v2"
    );

    document.getElementById("status").innerText =
        "Creating example embeddings...";

    for (const sentence of ON_EXAMPLES) {
        onEmbeddings.push(
            await embed(sentence)
        );
    }

    for (const sentence of OFF_EXAMPLES) {
        offEmbeddings.push(
            await embed(sentence)
        );
    }

    document.getElementById("status").innerText =
        "Model ready";
}

async function embed(text){

    const output = await extractor(
        text,
        {
            pooling: "mean",
            normalize: true
        }
    );

    return Array.from(output.data);
}

function cosine(a,b){

    let dot = 0;
    let magA = 0;
    let magB = 0;

    for(let i=0;i<a.length;i++){

        dot += a[i]*b[i];
        magA += a[i]*a[i];
        magB += b[i]*b[i];
    }

    return dot /
        (Math.sqrt(magA) *
         Math.sqrt(magB));
}

function averageTopK(scores,k=5){

    scores.sort((a,b)=>b-a);

    const top =
        scores.slice(0,k);

    return top.reduce(
        (a,b)=>a+b,0
    ) / top.length;
}

async function classifySentence(){

    await loadModel();

    const text =
        document
        .getElementById("input")
        .value
        .trim();

    if(!text){
        alert("Enter text");
        return;
    }

    document.getElementById("status")
        .innerText =
        "Analyzing meaning...";

    const userEmbedding =
        await embed(text);

    const onScores =
        onEmbeddings.map(
            e => cosine(userEmbedding,e)
        );

    const offScores =
        offEmbeddings.map(
            e => cosine(userEmbedding,e)
        );

    const onScore =
        averageTopK(onScores);

    const offScore =
        averageTopK(offScores);

    const total =
        onScore + offScore;

    const onPct =
        Math.round(
            (onScore/total)*100
        );

    const offPct =
        Math.round(
            (offScore/total)*100
        );

    document.getElementById("onPct")
        .innerText = onPct + "%";

    document.getElementById("offPct")
        .innerText = offPct + "%";

    document.getElementById("onBar")
        .style.width =
        onPct + "%";

    document.getElementById("offBar")
        .style.width =
        offPct + "%";

    document.getElementById("prediction")
        .innerText =
        onPct > offPct
        ? "Prediction: TURN LIGHT ON"
        : "Prediction: TURN LIGHT OFF";

    document.getElementById("result")
        .style.display = "block";

    document.getElementById("status")
        .innerText =
        "Done";
}

</script>

</body>
</html>
