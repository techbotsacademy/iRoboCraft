<!DOCTYPE html>
<html>
<head>
  <title>🎵 Pitch Detection (Working)</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>🎵 Pitch Detection</h2>
<button onclick="start()">▶️ Start</button>

<h3 id="freq">Frequency: -- Hz</h3>

<script>
let audioContext;
let analyser;
let buffer;

function start() {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(stream);

      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;

      source.connect(analyser);

      buffer = new Float32Array(analyser.fftSize);

      detect();
    });
}

function detect() {
  analyser.getFloatTimeDomainData(buffer);

  let freq = autoCorrelate(buffer, audioContext.sampleRate);

  document.getElementById("freq").innerText =
    "Frequency: " + (freq ? freq.toFixed(2) : "--") + " Hz";

  requestAnimationFrame(detect);
}

// Autocorrelation (core pitch detection)
function autoCorrelate(buf, sampleRate) {
  let SIZE = buf.length;
  let rms = 0;

  for (let i = 0; i < SIZE; i++) {
    rms += buf[i] * buf[i];
  }
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return null;

  let r1 = 0, r2 = SIZE - 1;

  for (let i = 0; i < SIZE / 2; i++) {
    if (Math.abs(buf[i]) < 0.2) {
      r1 = i;
      break;
    }
  }

  for (let i = 1; i < SIZE / 2; i++) {
    if (Math.abs(buf[SIZE - i]) < 0.2) {
      r2 = SIZE - i;
      break;
    }
  }

  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  let c = new Array(SIZE).fill(0);

  for (let i = 0; i < SIZE; i++) {
    for (let j = 0; j < SIZE - i; j++) {
      c[i] = c[i] + buf[j] * buf[j + i];
    }
  }

  let d = 0;
  while (c[d] > c[d + 1]) d++;

  let maxval = -1, maxpos = -1;
  for (let i = d; i < SIZE; i++) {
    if (c[i] > maxval) {
      maxval = c[i];
      maxpos = i;
    }
  }

  let T0 = maxpos;

  return sampleRate / T0;
}
</script>

</body>
</html>
