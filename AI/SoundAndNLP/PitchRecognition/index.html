<!DOCTYPE html>
<html>
<head>
  <title>🎵 Real Pitch AI (SPICE)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/spice"></script>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>🎵 Real Pitch Detection AI</h2>
<p>Click Start → Speak or sing 🎤</p>

<button onclick="start()">▶️ Start</button>

<h3 id="freq">Frequency: -- Hz</h3>
<h3 id="note">Note: --</h3>

<canvas id="graph" width="500" height="200" style="border:1px solid"></canvas>

<script>
let model;

async function loadModel() {
  try {
    model = await spice.load();
    console.log("✅ Model loaded");
  } catch (e) {
    console.error("❌ Model load failed", e);
    alert("Model failed to load. Check internet.");
  }
}

async function start() {
  try {
    await loadModel();

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log("✅ Mic access granted");

    const audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(stream);

    const analyser = audioContext.createAnalyser();
    source.connect(analyser);

    const data = new Float32Array(1024);

    async function detect() {
      analyser.getFloatTimeDomainData(data);

      const input = tf.tensor(data);
      const pitch = await model.estimatePitch(input);

      document.getElementById("freq").innerText =
        "Frequency: " + (pitch ? pitch.toFixed(2) : "0") + " Hz";

      requestAnimationFrame(detect);
    }

    detect();

  } catch (err) {
    console.error("❌ Error:", err);
    alert("Error: " + err.message);
  }
}
</script>

</body>
</html>
