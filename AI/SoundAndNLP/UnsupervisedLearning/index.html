<!DOCTYPE html>
<html>
<head>
  <title>🎧 Sound Bubble AI Map</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>🎧 Sound Bubble AI Map 🫧</h2>
<p>Make different sounds → Watch bubbles group!</p>

<button onclick="start()">▶ Start</button>
<button onclick="stop()">⏸ Stop</button>
<button onclick="clearMap()">🧹 Clear</button>

<br><br>

<canvas id="map" width="700" height="400" style="border:1px solid"></canvas>

<script>
let audioContext, analyser, buffer, sourceNode, streamRef;
let sounds = [];
let running = false;

function start(){
  if(running) return;

  navigator.mediaDevices.getUserMedia({audio:true})
  .then(stream=>{
    streamRef = stream;
    audioContext = new AudioContext();

    sourceNode = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 1024;

    sourceNode.connect(analyser);
    buffer = new Float32Array(analyser.fftSize);

    running = true;
    detect();
  });
}

function stop(){
  running = false;

  if(streamRef){
    streamRef.getTracks().forEach(track => track.stop());
  }

  if(audioContext){
    audioContext.close();
  }
}

function clearMap(){
  sounds = [];   // ONLY clears when button pressed
  draw();
}

function detect(){
  if(!running) return;

  analyser.getFloatTimeDomainData(buffer);

  let freq = autoCorrelate(buffer, audioContext.sampleRate);
  let volume = getVolume(buffer);

  if(freq && volume > 0.02){
    sounds.push({
      freq,
      volume,
      x: Math.random()*700,
      y: Math.random()*400
    });

    if(sounds.length > 60) sounds.shift();
  }

  cluster();
  draw();

  requestAnimationFrame(detect);
}

// 🔊 volume = bubble size
function getVolume(buf){
  let sum = 0;
  for(let i=0;i<buf.length;i++){
    sum += buf[i]*buf[i];
  }
  return Math.sqrt(sum/buf.length);
}

// 🧠 clustering
function cluster(){
  for(let i=0;i<sounds.length;i++){
    for(let j=0;j<sounds.length;j++){
      if(i === j) continue;

      let a = sounds[i];
      let b = sounds[j];

      let distFreq = Math.abs(a.freq - b.freq);

      if(distFreq < 100){
        a.x += (b.x - a.x) * 0.01;
        a.y += (b.y - a.y) * 0.01;
      } else {
        a.x -= (b.x - a.x) * 0.005;
        a.y -= (b.y - a.y) * 0.005;
      }
    }
  }
}

// 🎨 draw
function draw(){
  let c = document.getElementById("map");
  let ctx = c.getContext("2d");

  ctx.clearRect(0,0,700,400);

  sounds.forEach(s=>{
    let size = s.volume * 300;

    let color = s.freq < 300 ? "blue" :
                s.freq < 700 ? "green" : "red";

    ctx.beginPath();
    ctx.arc(s.x, s.y, size, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.6;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// 🎵 pitch detection
function autoCorrelate(buf, sampleRate){
  let SIZE = buf.length;
  let best = 0, bestCorr = 0;

  for (let lag=20; lag<200; lag++){
    let corr = 0;
    for (let i=0;i<SIZE-lag;i++){
      corr += buf[i]*buf[i+lag];
    }
    if (corr > bestCorr){
      bestCorr = corr;
      best = lag;
    }
  }

  return best ? sampleRate / best : null;
}
</script>

</body>
</html>
