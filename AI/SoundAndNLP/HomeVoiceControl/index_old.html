<!DOCTYPE html>
<html>
<head>
<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

.mic {
  font-size:50px;
  margin:20px;
  cursor:pointer;
}

.btn {
  padding:10px 20px;
  border-radius:10px;
  border:1px solid #444;
  display:inline-block;
  margin-top:20px;
}

.on { color:lightgreen; }
.off { color:red; }
</style>
</head>

<body>

<h2>🏠 Home Voice Control</h2>

<button onclick="connect()">🔌 Connect Arduino</button>

<div class="mic" onclick="start()">🎤</div>
<h3 id="arduinostatus">Connect to Arduino</h3>
<h3 id="status">Waiting...</h3>

<div id="light" class="btn off">💡 Light OFF</div>

<script>
let port;
let writer;
let recognition;

async function connect() {
    if (!("serial" in navigator)) {
        alert("Web Serial API not supported");
        return;
    }

    try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        writer = port.writable.getWriter();

        document.getElementById("arduinostatus").innerText = "Connected ✅";

    } catch (err) {
        alert("Connection failed: " + err.message);
    }
}

async function send(data){
  if(!writer) return;
  const encoder = new TextEncoder();
  await writer.write(encoder.encode(data + "\n"));
}

function start(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Speech Recognition not supported");
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "en-IN";

  recognition.onresult = function(e){
    const text = e.results[0][0].transcript.toLowerCase();
    document.getElementById("status").innerText = "You said: " + text;
    process(text);
  };

  recognition.start();
  document.getElementById("status").innerText = "Listening...";
}

function process(text){
  if(text.includes("light on")){
    document.getElementById("light").innerText = "💡 Light ON";
    document.getElementById("light").className = "btn on";
    send("ON");
  }
  else if(text.includes("light off")){
    document.getElementById("light").innerText = "💡 Light OFF";
    document.getElementById("light").className = "btn off";
    send("OFF");
  }
}
</script>

</body>
</html>
  </textarea>

  <!-- Run button OUTSIDE editor -->
  <button onclick="runCode()">▶ Run Code</button>
</div>

<!-- RIGHT PANEL -->
<div class="right">
  <iframe id="frame"></iframe>
</div>

<script>
const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
  lineNumbers: true,
  mode: "htmlmixed",
  theme: "default"
});

function runCode(){
  document.getElementById("frame").srcdoc = editor.getValue();
}
</script>

</body>
</html>
