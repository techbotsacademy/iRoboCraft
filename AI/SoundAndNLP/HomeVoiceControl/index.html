<!DOCTYPE html>
<html>
<head>
<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

.mic {
  font-size:50px;
  margin:20px;
  cursor:pointer;
}

.btn {
  padding:10px 20px;
  border-radius:10px;
  border:1px solid #444;
  display:inline-block;
  margin-top:20px;
}

.on { color:lightgreen; }
.off { color:red; }
</style>
</head>

<body>

<h2>🏠 Home Voice Control</h2>

<button onclick="connect()">🔌 Connect Arduino</button>

<div class="mic" onclick="start()">🎤</div>

<h3 id="status">Waiting...</h3>

<div id="light" class="btn off">💡 Light OFF</div>

<script>
let port;
let writer;

// CONNECT TO ARDUINO
async function connect(){
  try{
    port = await navigator.serial.requestPort();
    await port.open({ baudRate:9600 });
    writer = port.writable.getWriter();

    document.getElementById("status").innerText = "Connected ✅";
  }catch(e){
    console.log(e);
  }
}

// SEND DATA
async function send(data){
  if(!writer) return;
  const encoder = new TextEncoder();
  await writer.write(encoder.encode(data + "\\n"));
}

// SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "en-IN";

function start(){
  recognition.start();
  document.getElementById("status").innerText = "Listening...";
}

recognition.onresult = function(e){
  const text = e.results[0][0].transcript.toLowerCase();
  document.getElementById("status").innerText = "You said: " + text;

  process(text);

  setTimeout(()=>{
    document.getElementById("status").innerText = "Waiting...";
  },2000);
};

// PROCESS COMMAND
function process(text){

  if(text.includes("light on")){
    document.getElementById("light").innerText = "💡 Light ON";
    document.getElementById("light").className = "btn on";
    send("ON");
  }

  else if(text.includes("light off")){
    document.getElementById("light").innerText = "💡 Light OFF";
    document.getElementById("light").className = "btn off";
    send("OFF");
  }

  else{
    document.getElementById("status").innerText = "❌ I didn’t get that";
  }
}
</script>

</body>
</html>
</textarea>

<button onclick="runCode()">▶ Run Code</button>
</div>

<!-- RIGHT PANEL -->
<div class="right">
  <iframe id="frame"></iframe>
</div>

<script>
function runCode(){
  document.getElementById("frame").srcdoc =
    document.getElementById("code").value;
}
</script>

</body>
</html>
