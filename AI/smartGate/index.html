<!DOCTYPE html>
<html>
<head>
  <title>Smart Toll Gate System</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #container { position: relative; display: inline-block; }
    video { width: 640px; height: 480px; border: 2px solid black; }
    canvas { position: absolute; top: 0; left: 0; }
    button { margin: 10px; padding: 10px 20px; font-size: 16px; }
    #counter { font-size: 18px; font-weight: bold; margin-top: 10px; }
    #status { font-weight: bold; }
  </style>
</head>

<body>

<h2>SMART TOLL GATE - CAR ONLY</h2>

<button onclick="connectArduino()">Connect Arduino</button>
<button onclick="startCamera()">Start Camera</button>

<br><br>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="counter"></div>
<p id="status">Loading AI model...</p>

<script>

let model;
let writer;
let port;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");
const counterDiv = document.getElementById("counter");

const allowedClasses = ["person", "car", "bicycle", "motorcycle"];

async function init() {
  await tf.setBackend('webgl');
  await tf.ready();
  model = await cocoSsd.load();
  statusText.innerText = "Model Loaded. Connect Arduino & Start Camera.";
}

init();

async function connectArduino() {
  port = await navigator.serial.requestPort();
  await port.open({ baudRate: 9600 });
  writer = port.writable.getWriter();
  alert("Arduino Connected!");
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    detectFrame();
  };
}

async function detectFrame() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const predictions = await model.detect(video);

  let counts = {
    person: 0,
    car: 0,
    bicycle: 0,
    motorcycle: 0
  };

  predictions.forEach(pred => {
    if (allowedClasses.includes(pred.class) && pred.score > 0.5) {

      counts[pred.class]++;

      ctx.strokeStyle = "lime";
      ctx.lineWidth = 3;
      ctx.strokeRect(...pred.bbox);

      ctx.fillStyle = "lime";
      ctx.font = "18px Arial";
      ctx.fillText(
        `${pred.class} (${Math.round(pred.score * 100)}%)`,
        pred.bbox[0],
        pred.bbox[1] > 20 ? pred.bbox[1] - 5 : 20
      );
    }
  });

  counterDiv.innerHTML =
    `People: ${counts.person} | Cars: ${counts.car} | ` +
    `Cycles: ${counts.bicycle} | Motor Bikes: ${counts.motorcycle}`;

  // ======= IMPORTANT LOGIC =======
  if (writer) {
    if (counts.car > 0) {
        counterDiv.innerHTML = counterDiv.innerHTML+'Sending 1';
      writer.write(new TextEncoder().encode("1\n"));  // OPEN
    } else {
        counterDiv.innerHTML = counterDiv.innerHTML+'Sending 0';

        writer.write(new TextEncoder().encode("0\n"));  // CLOSE
    }
  }

  requestAnimationFrame(detectFrame);
}

</script>

</body>
</html>
