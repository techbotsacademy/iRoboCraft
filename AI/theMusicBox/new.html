<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>File Reader and Downloader</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        padding:30px;
    }

    .container{
        max-width:900px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
        margin-top:0;
    }

    textarea{
        width:100%;
        height:400px;
        margin-top:15px;
        padding:10px;
        font-size:16px;
        border-radius:8px;
        border:1px solid #ccc;
        resize:vertical;
        box-sizing:border-box;
    }

    .buttons{
        margin-top:15px;
        display:flex;
        gap:10px;
        flex-wrap:wrap;
    }

    button{
        padding:12px 20px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
    }

    .download-btn{
        background:#007bff;
        color:white;
    }

    .append-btn{
        background:#28a745;
        color:white;
    }

    input[type="file"]{
        margin-top:10px;
    }
</style>
</head>

<body>

<div class="container">

    <h2>Open, Edit and Download File</h2>

    <!-- Choose File -->
    <input type="file" id="fileInput">

    <!-- Text Area -->
    <textarea id="textArea" placeholder="File contents will appear here..."></textarea>

    <!-- Buttons -->
    <div class="buttons">
        <button class="append-btn" onclick="appendText()">
            Append Text
        </button>

        <button class="download-btn" onclick="downloadFile()">
            Download File
        </button>
    </div>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const textArea = document.getElementById("textArea");

/* Read File */
fileInput.addEventListener("change", function(event){

    const file = event.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        textArea.value = e.target.result;
    };

    reader.readAsText(file);

});


/* Append Some Text */
function appendText(){

    textArea.value += "\nNew text appended here.";

}


/* Download File */
function downloadFile(){

    const text = textArea.value;

    const blob = new Blob([text], { type: "text/plain" });

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = "edited_file.txt";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

}

</script>

</body>
</html>
