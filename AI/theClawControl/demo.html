<!DOCTYPE html>
<html>
<head>
  <title>Hand Servo Control</title>
  <style>
    body {
      text-align: center;
      background: #111;
      color: white;
      font-family: Arial;
    }
    canvas {
      border: 2px solid white;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-bottom: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<h2>Hand Controlled Servo 🤖</h2>
<p id="status">Waiting...</p>
<button id="connectBtn">Connect Arduino</button>
<video id="webcam" autoplay playsinline style="display:none;"></video>
<canvas id="output" width="640" height="480"></canvas>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";


const video = document.getElementById("webcam");
const canvas = document.getElementById("output");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");
const connectBtn = document.getElementById("connectBtn");


let handLandmarker;
let lastAngle = -1;
let lastSentTime = 0;
const sendDelay = 80; // ms delay for stable serial


// SERIAL
let port;
let writer;


connectBtn.addEventListener("click", async () => {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });
    writer = port.writable.getWriter();
    statusText.innerText = "Arduino Connected ✅";
  } catch (error) {
    statusText.innerText = "Connection Failed ❌";
  }
});


async function sendAngle(angle) {
  if (!writer) return;


  const now = Date.now();
  if (now - lastSentTime < sendDelay) return;


  try {
    const data = new TextEncoder().encode(angle + "\n");
    await writer.write(data);
    lastSentTime = now;
  } catch (err) {
    console.log("Serial Write Error:", err);
  }
}


// CAMERA
async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  return new Promise((resolve) => {
    video.onloadedmetadata = () => resolve(video);
  });
}


// LOAD MODEL
async function createHandLandmarker() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
  );


  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
    },
    runningMode: "VIDEO",
    numHands: 1
  });
}


// DISTANCE
function calculateDistance(p1, p2) {
  return Math.sqrt(
    (p1.x - p2.x) ** 2 +
    (p1.y - p2.y) ** 2
  );
}


// MAIN
function drawLandmarks(landmarks) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);


  for (const hand of landmarks) {


    const thumbTip = hand[4];
    const indexTip = hand[8];
    const wrist = hand[0];
    const middleMCP = hand[9];


    const palmSize = calculateDistance(wrist, middleMCP);
    const fingerDistance = calculateDistance(thumbTip, indexTip);


    let normalized = fingerDistance / palmSize;
    normalized = Math.max(0.1, Math.min(0.8, normalized));


    let servoAngle = Math.round(
      ((normalized - 0.1) / (0.8 - 0.1)) * 180
    );


    servoAngle = Math.max(0, Math.min(180, servoAngle));


    // SNAP ZONES
    if (servoAngle <= 10) servoAngle = 0;
    else if (servoAngle >= 40 && servoAngle <= 50) servoAngle = 45;
    else if (servoAngle >= 85 && servoAngle <= 95) servoAngle = 90;
    else if (servoAngle >= 170) servoAngle = 180;


    statusText.innerText = "Servo Angle: " + servoAngle;


    // SEND ONLY IF CHANGE >= 5
    if (Math.abs(servoAngle - lastAngle) >= 5) {
      sendAngle(servoAngle);
      lastAngle = servoAngle;
    }


    // DRAW POINTS
    for (const point of hand) {
      ctx.beginPath();
      ctx.arc(point.x * canvas.width,
              point.y * canvas.height,
              5, 0, 2 * Math.PI);
      ctx.fillStyle = "lime";
      ctx.fill();
    }


    // DRAW LINE
    ctx.beginPath();
    ctx.moveTo(thumbTip.x * canvas.width,
               thumbTip.y * canvas.height);
    ctx.lineTo(indexTip.x * canvas.width,
               indexTip.y * canvas.height);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 4;
    ctx.stroke();
  }
}


// LOOP
async function predictWebcam() {
  const results = handLandmarker.detectForVideo(
    video,
    performance.now()
  );


  if (results.landmarks) {
    drawLandmarks(results.landmarks);
  }


  requestAnimationFrame(predictWebcam);
}


// INIT
async function init() {
  await setupCamera();
  await createHandLandmarker();
  video.play();
  predictWebcam();
}


init();
</script>
</body>
</html>    
</textarea>

    <button onclick="runCode()">▶ Run</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <iframe id="output"></iframe>
  </div>

</div>

<script>
function runCode() {
  const code = document.getElementById("code").value;
  const iframe = document.getElementById("output");
  iframe.srcdoc = code;
}

// Auto run on load
runCode();
</script>

</body>
</html>
