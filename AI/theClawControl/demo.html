<!DOCTYPE html>
<html>
<head>
  <title>W3 Demo - Hand Servo Control</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 50%;
      background: #1e1e1e;
      color: white;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .right {
      width: 50%;
      border-left: 4px solid #4CAF50;
    }

    textarea {
      flex: 1;
      background: #111;
      color: #00ff90;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
      border: none;
      resize: none;
    }

    button {
      padding: 10px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 5px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    h3 {
      margin: 5px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <h3>✏️ Edit Code</h3>
    <textarea id="code"></textarea>
    <button onclick="runCode()">▶ Run Edited Code</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <iframe id="output" src="./index.html"></iframe>
  </div>

</div>

<script>

function loadOriginal() {
  const iframe = document.getElementById("output");

  iframe.onload = function() {
    try {
      const html = iframe.contentDocument.documentElement.outerHTML;
      document.getElementById("code").value = html;
    } catch (e) {
      alert("Browser blocked access. Open both files from same folder.");
    }
  };

  iframe.src = "./index.html";
}

function runCode() {
  const code = document.getElementById("code").value;
  const iframe = document.getElementById("output");
  iframe.srcdoc = code;
}

// ✅ Call after page fully loads
window.onload = function() {
  loadOriginal();
};

</script>

</body>
</html>
