<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Handwritten Digits</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;500;600&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:40px;
    font-family:'Poppins',sans-serif;
    background:
        radial-gradient(circle at top,#22356d 0%,#111827 45%,#090c16 100%);
    color:white;
    min-height:100vh;
}

h1{
    text-align:center;
    font-family:'Orbitron',sans-serif;
    font-size:42px;
    letter-spacing:2px;
    color:#6cf6ff;
    margin-bottom:35px;
    text-shadow:0 0 15px rgba(108,246,255,.6);
}

button{

    padding:14px 28px;

    border:none;

    border-radius:30px;

    background:linear-gradient(135deg,#00d4ff,#4f7cff);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    transform:translateY(-3px);

    box-shadow:0 0 18px #3fdfff;
}

#drawingSection{

    display:none;

    margin-top:35px;
}

.pipeline{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:30px;

    flex-wrap:wrap;
}

.panel{
    width:300px;                  /* was 350px */
    min-height:430px;
    padding:16px;
    flex:0 0 300px;               /* prevent growing */
}

.panel:hover{

    transform:translateY(-8px);

    box-shadow:
    0 0 35px rgba(0,255,255,.25);
}

.panel h3{

    margin-top:5px;

    margin-bottom:18px;

    color:#79f9ff;

    font-weight:600;

    letter-spacing:.5px;
}

.arrow{

    width:70px;

    height:70px;

    border-radius:50%;

    background:rgba(0,255,255,.1);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:34px;

    color:#6cf6ff;

    box-shadow:0 0 18px rgba(0,255,255,.25);
}

canvas{

    width:288px;

    height:240px;

    background:white;

    border:none;

    border-radius:15px;

    box-shadow:
    0 0 20px rgba(0,255,255,.18);
}

#matrix{
    width:250px;
    height:208px;

    background:#08131d;

    border-radius:15px;

    overflow:auto;

    font-family:Consolas,monospace;
    font-size:7px;
    line-height:8px;
    white-space:pre;

    padding:6px;

    box-shadow:
        inset 0 0 20px rgba(0,255,150,.2);
}

.zero{
    color:#42b6ff;      /* Blue */
    font-weight:bold;
}

.one{
    color:#50ff6a;      /* Green */
    font-weight:bold;
}

.controls{

    margin-top:18px;

    display:flex;

    gap:12px;
}

.controls button:first-child{

    background:linear-gradient(135deg,#ff6a6a,#ff8d42);
}

.controls button:last-child{

    background:linear-gradient(135deg,#00d084,#00c9ff);
}

@media(max-width:1200px){

.pipeline{
    display:flex;
    justify-content:flex-start;   /* instead of center */
    align-items:center;
    gap:16px;                     /* was 30px */
    flex-wrap:nowrap;             /* keep everything on one row */
    overflow-x:auto;              /* only scroll if absolutely necessary */
    padding-left:10px;
}

.arrow{

    transform:rotate(90deg);
}

}
</style>
</head>

<body>

<h1>Handwritten Digits</h1>

<center>
<button id="addBtn">Add Sample</button>
</center>

<div id="drawingSection">

<div class="pipeline">

<div class="panel">
<h3>Colored Drawing</h3>

<!-- 3 inches × 2.5 inches -->
<canvas id="drawCanvas"
width="288"
height="240">
</canvas>

<div class="controls">
<button id="clearBtn">Clear</button>
<button id="recognizeBtn">Recognize</button>
</div>

</div>

<div class="arrow">➜</div>

<div class="panel">
<h3>Black & White Image</h3>

<canvas id="bwCanvas"
width="288"
height="240">
</canvas>

</div>

<div class="arrow">➜</div>

<div class="panel">
<h3>0 / 1 Pixel Matrix</h3>

<div id="matrix"></div>

</div>

</div>

</div>

<script>

const addBtn=document.getElementById("addBtn");
const section=document.getElementById("drawingSection");

addBtn.onclick=()=>{
    section.style.display="block";
};

const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.lineWidth=12;
ctx.lineCap="round";

let drawing=false;

function getPos(e){

    const rect=canvas.getBoundingClientRect();

    if(e.touches){
        return{
            x:e.touches[0].clientX-rect.left,
            y:e.touches[0].clientY-rect.top
        };
    }

    return{
        x:e.clientX-rect.left,
        y:e.clientY-rect.top
    };
}

function start(e){

    drawing=true;

    const p=getPos(e);

    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
}

function draw(e){

    if(!drawing) return;

    e.preventDefault();

    const p=getPos(e);

    ctx.strokeStyle="red";     // can be changed to any color
    ctx.lineTo(p.x,p.y);
    ctx.stroke();

    updateBW();
}

function stop(){
    drawing=false;
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stop);
canvas.addEventListener("mouseleave",stop);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",draw);
canvas.addEventListener("touchend",stop);

const bwCanvas=document.getElementById("bwCanvas");
const bwCtx=bwCanvas.getContext("2d");

function updateBW() {

    // Copy drawing to the B/W canvas
    bwCtx.clearRect(0, 0, bwCanvas.width, bwCanvas.height);
    bwCtx.drawImage(canvas, 0, 0);

    let img = bwCtx.getImageData(0, 0, bwCanvas.width, bwCanvas.height);
    let data = img.data;

    // Convert EVERY pixel to black or white
    for (let i = 0; i < data.length; i += 4) {

        let gray = (data[i] + data[i + 1] + data[i + 2]) / 3;

        let value = gray < 180 ? 0 : 255;

        data[i] = value;
        data[i + 1] = value;
        data[i + 2] = value;
    }

    bwCtx.putImageData(img, 0, 0);

    // Create the binary matrix from the B/W image
    let matrix = "";

    let cellWidth = 4;
    let cellHeight = 4;

    for (let y = 0; y < bwCanvas.height; y += cellHeight) {

        for (let x = 0; x < bwCanvas.width; x += cellWidth) {

            let index = (y * bwCanvas.width + x) * 4;

            let bit = data[index] === 0 ? 0 : 1;

            if(bit === 0){
               matrix += '<span class="zero">0</span> ';
            }else{
                matrix += '<span class="one">1</span> ';
            }

        }

        matrix += "\n";
    }

    document.getElementById("matrix").innerHTML = matrix;
}

document.getElementById("clearBtn").onclick=()=>{

    ctx.fillStyle="white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    bwCtx.fillStyle="white";
    bwCtx.fillRect(0,0,bwCanvas.width,bwCanvas.height);

    document.getElementById("matrix").textContent="";
};

</script>

</body>
</html>
