<!DOCTYPE html>
<html>
<head>
    <title>Number Plate Reader</title>

    <script async
        src="https://docs.opencv.org/4.x/opencv.js">
    </script>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        canvas {
            border: 1px solid #ccc;
            max-width: 100%;
            margin-top: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>License Plate Recognition</h2>

    <select id="repoImageSelect"
            style="
                flex:1;
                background:#111;
                color:white;
                border:1px solid #00f2ff;
                padding:10px;
                border-radius:4px;
            ">
        <option value="../cars/car1.jpg">car1</option>
        <option value="../cars/car2.webp">car2</option>
        <option value="../cars/car3.png">car3</option>
    </select>

    <button class="btn-primary"
            onclick="loadSelectedRepoImage()">
        Open
    </button>

<br><br>

<canvas id="canvas"></canvas>

<div id="result">Plate Number: -</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
function log(message) {
    console.log(message);
}
    function loadImageFromPath(path) {

        const img = new Image();

        img.onload = function() {

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);

            log("Loaded repository image: " + path);

            detectPlate();
        };

        img.onerror = function() {
            log("Failed to load image: " + path);
            alert("Could not load " + path);
        };

        img.src = path;
    }

    function loadSelectedRepoImage() {

        const path =
            document.getElementById("repoImageSelect").value;

        loadImageFromPath(path);
    }

async function detectPlate(){

    let src = cv.imread(canvas);

    let gray = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    let blur = new cv.Mat();

    cv.bilateralFilter(
        gray,
        blur,
        11,
        17,
        17
    );

    let edges = new cv.Mat();

    cv.Canny(
        blur,
        edges,
        30,
        200
    );

    let contours = new cv.MatVector();

    let hierarchy = new cv.Mat();

    cv.findContours(
        edges,
        contours,
        hierarchy,
        cv.RETR_TREE,
        cv.CHAIN_APPROX_SIMPLE
    );

    let bestRect = null;
    let bestArea = 0;

    for(let i=0;i<contours.size();i++){

        let cnt = contours.get(i);

        let peri = cv.arcLength(cnt,true);

        let approx = new cv.Mat();

        cv.approxPolyDP(
            cnt,
            approx,
            0.02 * peri,
            true
        );

        if(approx.rows === 4){

            let rect =
                cv.boundingRect(approx);

            let ratio =
                rect.width / rect.height;

            let area =
                rect.width * rect.height;

            if(
                ratio > 2 &&
                ratio < 6 &&
                area > bestArea
            ){
                bestArea = area;
                bestRect = rect;
            }
        }

        approx.delete();
        cnt.delete();
    }

    if(!bestRect){

        document.getElementById("result")
            .innerText =
            "No plate found";

        return;
    }

    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;

    ctx.strokeRect(
        bestRect.x,
        bestRect.y,
        bestRect.width,
        bestRect.height
    );

    let crop =
        document.createElement("canvas");

    crop.width = bestRect.width;
    crop.height = bestRect.height;

    crop.getContext("2d").drawImage(
        canvas,
        bestRect.x,
        bestRect.y,
        bestRect.width,
        bestRect.height,
        0,
        0,
        bestRect.width,
        bestRect.height
    );

    const { data } =
        await Tesseract.recognize(
            crop,
            "eng"
        );

    let plate =
        data.text
        .replace(/[^A-Z0-9]/gi,'')
        .toUpperCase();

    document.getElementById("result")
        .innerText =
        "Plate Number: " + plate;

    src.delete();
    gray.delete();
    blur.delete();
    edges.delete();
    contours.delete();
    hierarchy.delete();
}

</script>

</body>
</html>
