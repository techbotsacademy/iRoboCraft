<!DOCTYPE html>
<html>
<head>
  <title>Mouth Open Close Detection</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      text-align: center;
      background: #111;
      color: white;
      font-family: Arial;
    }
    video {
      border: 2px solid cyan;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1 id="status">Loading...</h1>
  <button id="connectBtn">Connect to Arduino</button>
  <br><br>
  <video id="video" width="640" height="480" autoplay></video>

  <script>
    const video = document.getElementById("video");
    const statusText = document.getElementById("status");
    const connectBtn = document.getElementById("connectBtn");

    let port;
    let writer;
    let lastState = null; // Prevent repeated sending

    // ---------- CONNECT TO ARDUINO ----------
    connectBtn.addEventListener("click", async () => {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });

        const encoder = new TextEncoderStream();
        encoder.readable.pipeTo(port.writable);
        writer = encoder.writable.getWriter();

        statusText.innerText = "Connected to Arduino ✅";
      } catch (err) {
        alert("Connection failed!");
        console.error(err);
      }
    });

    async function sendToArduino(value) {
      if (writer && value !== lastState) {
        await writer.write(value);
        lastState = value;
        console.log("Sent:", value+ "\n");
      }
    }

    // ---------- MEDIAPIPE ----------
    const faceMesh = new FaceMesh({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(async (results) => {
      if (!results.multiFaceLandmarks) return;

      const landmarks = results.multiFaceLandmarks[0];

      const upperLip = landmarks[13];
      const lowerLip = landmarks[14];

      const lipDistance = Math.abs(upperLip.y - lowerLip.y);

      if (lipDistance > 0.015) {
        statusText.innerText = "MOUTH OPEN 😮";
        await sendToArduino("1");
      } else {
        statusText.innerText = "MOUTH CLOSED 🙂";
        await sendToArduino("0");
      }
    });

    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({ image: video });
      },
      width: 640,
      height: 480
    });

    camera.start();
  </script>

</body>
</html>
